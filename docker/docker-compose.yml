name: virgo

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: virgo-app:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/virgo_pg
      VIRGO_CONFIG_FILE: /app/config.toml
    ports:
      - "${VIRGO_HTTP_PORT:-8000}:8000"
    volumes:
      - ../config.toml:/app/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: virgo_pg
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - virgo_pg_data:/var/lib/postgresql/data
      - ../pg/init:/docker-entrypoint-initdb.d:ro
      - ../pg/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d virgo_pg"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  virgo_pg_data:
